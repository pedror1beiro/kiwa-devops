services:
  db:
    image: postgres:16
    container_name: exampledb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: exampledb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d exampledb"]
      interval: 3s
      timeout: 3s
      retries: 20
